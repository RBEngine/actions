name: 'Deploy Roblox Place'
description: 'Build a Rojo place file and publish it to Roblox. Secrets are provided by the caller as inputs, so it works from any repository or organization.'

inputs:
  is_dispatch:
    description: 'Whether this run was triggered by a central library update.'
    required: false
    default: 'false'
  environment_target:
    description: 'Target environment for dispatch runs: prod or test.'
    required: false
    default: ''
  target_branch:
    description: 'Branch to deploy for dispatch runs.'
    required: false
    default: ''
  submodule_token:
    description: 'Token with read access to private submodules. Falls back to the job token when empty.'
    required: false
    default: ''
  prod_universe_id:
    description: 'Roblox universe id for the production place.'
    required: false
    default: ''
  prod_place_id:
    description: 'Roblox place id for the production place.'
    required: false
    default: ''
  test_universe_id:
    description: 'Roblox universe id for the test place.'
    required: false
    default: ''
  test_place_id:
    description: 'Roblox place id for the test place.'
    required: false
    default: ''
  roblox_api_key:
    description: 'Roblox Open Cloud API key used to publish.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: true
        token: ${{ inputs.submodule_token != '' && inputs.submodule_token || github.token }}

    - name: Update Submodules
      if: ${{ inputs.is_dispatch == 'true' }}
      shell: bash
      run: |
        git submodule update --remote --merge
        git submodule foreach "git checkout ${{ inputs.target_branch }} || true"

    - name: Install Rojo
      uses: ok-nick/setup-aftman@v0.4.2

    - name: Build Place File
      shell: bash
      run: rojo build -o place.rbxl

    - name: Determine Target Environment
      id: target
      shell: bash
      run: |
        IS_PROD="false"
        if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
          IS_PROD="true"
        elif [ "${{ inputs.is_dispatch }}" == "true" ] && [ "${{ inputs.environment_target }}" == "prod" ]; then
          IS_PROD="true"
        fi
        echo "is_prod=$IS_PROD" >> "$GITHUB_OUTPUT"

    - name: Publish to Official (PROD)
      if: ${{ steps.target.outputs.is_prod == 'true' }}
      shell: bash
      run: |
        echo "Pushing to Official Place"
        curl --fail --location --request POST "https://apis.roblox.com/universes/v1/${{ inputs.prod_universe_id }}/places/${{ inputs.prod_place_id }}/versions?versionType=Published" \
          --header "x-api-key: ${{ inputs.roblox_api_key }}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary "@place.rbxl"

    - name: Publish to Test Place (TEST)
      if: ${{ steps.target.outputs.is_prod == 'false' }}
      shell: bash
      run: |
        echo "Pushing to Test Place"
        curl --fail --location --request POST "https://apis.roblox.com/universes/v1/${{ inputs.test_universe_id }}/places/${{ inputs.test_place_id }}/versions?versionType=Published" \
          --header "x-api-key: ${{ inputs.roblox_api_key }}" \
          --header "Content-Type: application/octet-stream" \
          --data-binary "@place.rbxl"
